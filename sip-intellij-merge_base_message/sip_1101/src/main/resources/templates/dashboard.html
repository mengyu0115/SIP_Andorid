<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP IM 系统 - 查询管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 768px) {
            .nav-grid { grid-template-columns: 1fr; }
        }
        .nav-card {
            display: block;
            background: white;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .nav-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .nav-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .nav-desc {
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SIP IM 查询管理</h1>
            <p>SIP 即时通讯系统 - 数据查询与管理</p>
        </div>
        <div class="nav-grid">
            <a href="/view/online-users" class="nav-card">
                <div class="nav-icon">&#128101;</div>
                <div class="nav-title">用户列表</div>
                <div class="nav-desc">查看所有用户及在线状态</div>
            </a>
            <a href="/view/call-records" class="nav-card">
                <div class="nav-icon">&#128222;</div>
                <div class="nav-title">通话记录</div>
                <div class="nav-desc">查询音视频通话记录</div>
            </a>
            <a href="/view/conferences" class="nav-card">
                <div class="nav-icon">&#127909;</div>
                <div class="nav-title">会议记录</div>
                <div class="nav-desc">查询会议记录及参与者</div>
            </a>
        </div>
    </div>
</body>
</html>
