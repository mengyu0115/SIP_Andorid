<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控 - SIP IM 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .back-btn, .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 14px;
        }

        .back-btn:hover, .refresh-btn:hover {
            transform: translateY(-2px);
        }

        .auto-refresh-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        /* 系统概览卡片 */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .stat-trend {
            font-size: 12px;
            margin-top: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .trend-up {
            background: #d4edda;
            color: #155724;
        }

        .trend-down {
            background: #f8d7da;
            color: #721c24;
        }

        /* 主要内容区域 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
        }

        .section-badge {
            background: #e7f0ff;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        /* 系统信息表格 */
        .info-table {
            width: 100%;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-size: 14px;
        }

        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        /* 用户列表 */
        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #f8f9ff;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 15px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .user-status {
            color: #999;
            font-size: 12px;
            margin-top: 2px;
        }

        .user-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-online {
            background: #d4edda;
            color: #155724;
        }

        /* 统计图表容器 */
        .chart-container {
            height: 250px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px 0;
            border-top: 1px solid #f0f0f0;
            margin-top: 20px;
        }

        .chart-bar {
            flex: 1;
            margin: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bar {
            width: 100%;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
            position: relative;
        }

        .bar:hover {
            opacity: 0.8;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            color: #667eea;
            font-size: 14px;
        }

        .bar-label {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
            text-align: center;
        }

        /* 活动日志 */
        .activity-log {
            max-height: 300px;
            overflow-y: auto;
        }

        .log-item {
            padding: 12px;
            border-left: 3px solid #667eea;
            background: #f8f9ff;
            margin-bottom: 10px;
            border-radius: 0 5px 5px 0;
        }

        .log-time {
            color: #999;
            font-size: 11px;
            margin-bottom: 5px;
        }

        .log-message {
            color: #333;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .time-info {
            color: white;
            font-size: 12px;
            text-align: right;
            margin-top: 15px;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>⚙️ 系统监控</h1>
            <div class="header-controls">
                <label class="auto-refresh-label">
                    <input type="checkbox" id="autoRefresh" checked>
                    自动刷新 (30秒)
                </label>
                <button class="refresh-btn" onclick="loadAllData()">🔄 刷新</button>
                <a href="http://10.29.209.85:8081/dashboard" class="back-btn">← 返回主页</a>
            </div>
        </div>

        <!-- 错误提示 -->
        <div id="errorMessage" class="error" style="display: none;"></div>

        <!-- 系统概览 -->
        <div class="overview-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalUsers">-</div>
                <div class="stat-label">注册用户总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-value" id="onlineUsers">-</div>
                <div class="stat-label">当前在线用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📹</div>
                <div class="stat-value" id="activeConferences">-</div>
                <div class="stat-label">进行中会议</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💬</div>
                <div class="stat-value" id="todayMessages">-</div>
                <div class="stat-label">今日消息数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📞</div>
                <div class="stat-value" id="todayCalls">-</div>
                <div class="stat-label">今日通话数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="systemStatus">运行中</div>
                <div class="stat-label">系统状态</div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="content-grid">
            <!-- 系统信息 -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">📊 系统信息</h2>
                    <span class="section-badge" id="uptimeBadge">运行时长: -</span>
                </div>
                <div class="info-table">
                    <div class="info-row">
                        <span class="info-label">JVM 内存使用</span>
                        <span class="info-value" id="memoryUsage">-</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="memoryProgress" style="width: 0%"></div>
                    </div>
                    <div class="info-row" style="margin-top: 15px;">
                        <span class="info-label">线程数</span>
                        <span class="info-value" id="threadCount">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">CPU 核心数</span>
                        <span class="info-value" id="cpuCount">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">系统启动时间</span>
                        <span class="info-value" id="startTime">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">SIP 服务器</span>
                        <span class="info-value">10.29.209.85:5060</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">HTTP 服务器</span>
                        <span class="info-value">10.29.209.85:8081</span>
                    </div>
                </div>
            </div>

            <!-- 在线用户 -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">👥 在线用户</h2>
                    <span class="section-badge" id="onlineCount">0 人在线</span>
                </div>
                <div class="user-list" id="onlineUserList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 数据统计 -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">📈 数据统计（近7天）</h2>
            </div>
            <div class="chart-container" id="statsChart">
                <div class="chart-bar">
                    <div class="bar" style="height: 0px;">
                        <span class="bar-value">0</span>
                    </div>
                    <div class="bar-label">用户注册</div>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 0px;">
                        <span class="bar-value">0</span>
                    </div>
                    <div class="bar-label">消息发送</div>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 0px;">
                        <span class="bar-value">0</span>
                    </div>
                    <div class="bar-label">语音通话</div>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 0px;">
                        <span class="bar-value">0</span>
                    </div>
                    <div class="bar-label">视频通话</div>
                </div>
                <div class="chart-bar">
                    <div class="bar" style="height: 0px;">
                        <span class="bar-value">0</span>
                    </div>
                    <div class="bar-label">会议创建</div>
                </div>
            </div>
        </div>

        <!-- 时间信息 -->
        <div class="time-info" id="timeInfo"></div>
    </div>

    <script>
        let autoRefreshInterval = null;

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            setupAutoRefresh();
        });

        // 加载所有数据
        async function loadAllData() {
            await Promise.all([
                loadSystemSummary(),
                loadOnlineUsers()
            ]);
            updateTimeInfo();
        }

        // 加载系统概览
        async function loadSystemSummary() {
            try {
                const response = await fetch('http://10.29.209.85:8081/api/admin/monitor/summary');
                const result = await response.json();

                if (result.code === 200) {
                    const data = result.data;

                    // 更新概览卡片
                    document.getElementById('totalUsers').textContent = data.totalUsers || 0;
                    document.getElementById('onlineUsers').textContent = data.onlineUsers || 0;
                    document.getElementById('activeConferences').textContent = data.activeConferences || 0;
                    document.getElementById('todayMessages').textContent = data.todayMessages || 0;
                    document.getElementById('todayCalls').textContent = data.todayCalls || 0;

                    // 更新系统信息
                    if (data.systemInfo) {
                        const sys = data.systemInfo;
                        document.getElementById('memoryUsage').textContent =
                            `${(sys.usedMemory / 1024 / 1024).toFixed(0)} MB / ${(sys.totalMemory / 1024 / 1024).toFixed(0)} MB`;

                        const memPercent = (sys.usedMemory / sys.totalMemory * 100).toFixed(1);
                        document.getElementById('memoryProgress').style.width = memPercent + '%';

                        document.getElementById('threadCount').textContent = sys.threadCount || '-';
                        document.getElementById('cpuCount').textContent = sys.availableProcessors || '-';

                        if (sys.startTime) {
                            document.getElementById('startTime').textContent = formatDateTime(sys.startTime);
                            const uptime = calculateUptime(sys.startTime);
                            document.getElementById('uptimeBadge').textContent = '运行时长: ' + uptime;
                        }
                    }

                    // 更新统计图表
                    updateStatsChart(data);

                    hideError();
                } else {
                    showError('加载系统概览失败: ' + result.message);
                }
            } catch (error) {
                console.error('加载系统概览失败:', error);
                showError('网络错误，无法加载系统数据');
            }
        }

        // 加载在线用户
        async function loadOnlineUsers() {
            try {
                const response = await fetch('http://10.29.209.85:8081/api/online/users');
                const result = await response.json();

                if (result.code === 200) {
                    const users = result.data || [];
                    displayOnlineUsers(users);
                }
            } catch (error) {
                console.error('加载在线用户失败:', error);
            }
        }

        // 显示在线用户
        function displayOnlineUsers(users) {
            const container = document.getElementById('onlineUserList');
            document.getElementById('onlineCount').textContent = users.length + ' 人在线';

            if (users.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无在线用户</div>';
                return;
            }

            container.innerHTML = users.map(user => `
                <div class="user-item">
                    <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="user-info">
                        <div class="user-name">${user.username}</div>
                        <div class="user-status">${user.ipAddress} | ${formatDateTime(user.loginTime)}</div>
                    </div>
                    <span class="user-badge badge-online">在线</span>
                </div>
            `).join('');
        }

        // 更新统计图表
        function updateStatsChart(data) {
            const maxHeight = 200;
            const stats = [
                { value: data.todayRegistrations || 0, label: '用户注册' },
                { value: data.todayMessages || 0, label: '消息发送' },
                { value: data.todayVoiceCalls || 0, label: '语音通话' },
                { value: data.todayVideoCalls || 0, label: '视频通话' },
                { value: data.todayConferences || 0, label: '会议创建' }
            ];

            const maxValue = Math.max(...stats.map(s => s.value), 1);

            const bars = document.querySelectorAll('.chart-bar .bar');
            stats.forEach((stat, index) => {
                if (bars[index]) {
                    const height = (stat.value / maxValue) * maxHeight;
                    bars[index].style.height = height + 'px';
                    bars[index].querySelector('.bar-value').textContent = stat.value;
                }
            });
        }

        // 计算运行时长
        function calculateUptime(startTime) {
            const now = new Date();
            const start = new Date(startTime);
            const diff = now - start;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            if (days > 0) {
                return `${days}天 ${hours}小时`;
            } else if (hours > 0) {
                return `${hours}小时 ${minutes}分钟`;
            } else {
                return `${minutes}分钟`;
            }
        }

        // 格式化日期时间
        function formatDateTime(dateTime) {
            if (!dateTime) return '-';
            const date = new Date(dateTime);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 更新时间信息
        function updateTimeInfo() {
            const now = new Date();
            document.getElementById('timeInfo').textContent =
                '数据更新时间: ' + now.toLocaleString('zh-CN');
        }

        // 设置自动刷新
        function setupAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');

            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    startAutoRefresh();
                } else {
                    stopAutoRefresh();
                }
            });

            if (checkbox.checked) {
                startAutoRefresh();
            }
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) return;
            autoRefreshInterval = setInterval(loadAllData, 30000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
