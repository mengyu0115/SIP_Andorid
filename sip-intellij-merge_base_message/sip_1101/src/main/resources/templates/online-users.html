<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户列表 - SIP IM 系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white; padding: 25px 30px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { color: #333; font-size: 28px; }
        .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 10px 20px; border-radius: 5px;
            text-decoration: none; transition: transform 0.2s;
        }
        .back-btn:hover { transform: translateY(-2px); }
        .stats-bar {
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center;
        }
        .stat-item h3 { color: #667eea; font-size: 36px; margin-bottom: 5px; }
        .stat-item p { color: #666; font-size: 14px; }
        .controls {
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
            display: flex; gap: 15px; align-items: center;
        }
        .search-box {
            flex: 1; min-width: 250px; padding: 10px 15px;
            border: 2px solid #e0e0e0; border-radius: 5px; font-size: 14px;
        }
        .search-box:focus { outline: none; border-color: #667eea; }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 10px 20px; border: none; border-radius: 5px;
            cursor: pointer; font-size: 14px;
        }
        .table-container {
            background: white; padding: 25px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        th { padding: 15px; text-align: left; font-weight: 600; font-size: 14px; }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #333; }
        tbody tr:hover { background: #f8f9ff; }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-size: 12px; font-weight: bold;
        }
        .status-online { background: #d4edda; color: #155724; }
        .status-offline { background: #e2e3e5; color: #6c757d; }
        .loading { text-align: center; padding: 40px; color: #667eea; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>&#128101; 用户列表</h1>
            <a href="/dashboard" class="back-btn">&#8592; 返回主页</a>
        </div>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div class="stats-bar">
            <div class="stat-item">
                <h3 id="totalUsers">-</h3>
                <p>总用户数</p>
            </div>
            <div class="stat-item">
                <h3 id="onlineCount">-</h3>
                <p>在线用户</p>
            </div>
            <div class="stat-item">
                <h3 id="offlineCount">-</h3>
                <p>离线用户</p>
            </div>
        </div>
        <div class="controls">
            <input type="text" id="searchBox" class="search-box" placeholder="搜索用户名...">
            <button class="refresh-btn" onclick="loadUsers()">&#128260; 刷新</button>
        </div>
        <div class="table-container">
            <div id="loadingMessage" class="loading">正在加载用户数据...</div>
            <table id="userTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>昵称</th>
                        <th>注册时间</th>
                        <th>最后登录</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">暂无用户数据</div>
        </div>
    </div>
    <script>
        let allUsers = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
            document.getElementById('searchBox').addEventListener('input', filterUsers);
        });

        async function loadUsers() {
            try {
                const response = await fetch('/api/admin/users/all-with-status');
                const result = await response.json();
                if (result.code === 200) {
                    allUsers = result.data || [];
                    displayUsers(allUsers);
                    updateStats(allUsers);
                    document.getElementById('errorMessage').style.display = 'none';
                } else {
                    showError('加载失败: ' + result.message);
                }
            } catch (error) {
                showError('网络错误，无法加载数据');
            }
        }

        function displayUsers(users) {
            const tbody = document.getElementById('userTableBody');
            const table = document.getElementById('userTable');
            document.getElementById('loadingMessage').style.display = 'none';

            if (users.length === 0) {
                table.style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }
            document.getElementById('emptyState').style.display = 'none';
            table.style.display = 'table';

            tbody.innerHTML = users.map(function(user) {
                var statusClass = user.isOnline ? 'status-online' : 'status-offline';
                var statusText = user.isOnline ? '在线' : '离线';
                return '<tr>' +
                    '<td>' + user.id + '</td>' +
                    '<td><strong>' + user.username + '</strong></td>' +
                    '<td>' + (user.nickname || '-') + '</td>' +
                    '<td>' + formatDateTime(user.createTime) + '</td>' +
                    '<td>' + formatDateTime(user.lastLoginTime) + '</td>' +
                    '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
                    '</tr>';
            }).join('');
        }

        function updateStats(users) {
            var online = users.filter(function(u) { return u.isOnline; }).length;
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('onlineCount').textContent = online;
            document.getElementById('offlineCount').textContent = users.length - online;
        }

        function filterUsers() {
            var keyword = document.getElementById('searchBox').value.toLowerCase().trim();
            if (!keyword) { displayUsers(allUsers); return; }
            var filtered = allUsers.filter(function(user) {
                return user.username.toLowerCase().includes(keyword) ||
                       (user.nickname && user.nickname.toLowerCase().includes(keyword));
            });
            displayUsers(filtered);
        }

        function formatDateTime(dt) {
            if (!dt) return '-';
            var date = new Date(dt);
            return date.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function showError(msg) {
            var el = document.getElementById('errorMessage');
            el.textContent = msg; el.style.display = 'block';
        }
    </script>
</body>
</html>
