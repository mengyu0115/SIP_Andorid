# ========================================
# SIP 即时通信系统配置文件
# ========================================

# 服务器配置
server:
  port: 8081  # 使用 8081 端口避免冲突
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring配置
spring:
  application:
    name: sip-im-system

  # MVC配置 (修复Swagger与Spring Boot 2.6+的兼容性问题)
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/sip?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 使用环境变量,或默认值
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
      file-size-threshold: 0

  # JSON配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sip.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ========================================
# SIP 配置
# ========================================
sip:
  # MSS (MiniSipServer) 服务器配置
  server:
    host: 10.29.209.85       # MSS服务器地址(当前主机)
    port: 5060
    domain: 10.29.209.85     # SIP域名

  # 本地配置
  local:
    host: 0.0.0.0            # 本地监听地址
    port: 5061               # 本地SIP端口
    transport: udp           # 传输协议: udp, tcp, tls

  # 注册配置
  register:
    expires: 3600            # 注册过期时间(秒) - 实际由MSS服务器决定
    retry-interval: 30       # 注册失败重试间隔(秒)
    max-retry: 3             # 最大重试次数

# ========================================
# RTP 配置
# ========================================
rtp:
  # 端口范围
  audio:
    port-start: 10002
    port-end: 20000

  video:
    port-start: 20003
    port-end: 30000

  # 编解码器配置
  codec:
    audio:
      - name: PCMU
        payload-type: 0
        clock-rate: 8000
      - name: Opus
        payload-type: 111
        clock-rate: 48000

    video:
      - name: H264
        payload-type: 96
        clock-rate: 90000

  # RTCP配置
  rtcp:
    enabled: true
    report-interval: 5000    # 报告间隔(毫秒)

# ========================================
# 媒体配置
# ========================================
media:
  # 音频配置
  audio:
    sample-rate: 48000       # 采样率
    channels: 1              # 声道数
    frame-size: 960          # 帧大小

  # 视频配置
  video:
    width: 640
    height: 480
    frame-rate: 25           # 帧率
    bitrate: 500000          # 比特率

# ========================================
# 文件存储配置
# ========================================
file:
  # 上传目录 (Windows路径示例,Linux请修改为/opt/sip-im/files)
  upload-dir: C:/sip_uploads
  # 文件访问URL前缀
  base-url: http://10.129.114.129:8081/files
  # 允许的文件类型
  allowed-types:
    - image/jpeg
    - image/png
    - image/gif
    - audio/mpeg
    - audio/wav
    - audio/x-wav
    - audio/x-m4a
    - video/mp4
    - video/x-msvideo
    - video/quicktime
    - video/x-matroska
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    - application/octet-stream

# ========================================
# 日志配置（由 logback-spring.xml 统一管理）
# ========================================
logging:
  level:
    root: INFO
    com.sip: DEBUG
    org.springframework.web: INFO
    com.baomidou.mybatisplus: DEBUG

# ========================================
# WebSocket配置
# ========================================
websocket:
  path: /ws
  allowed-origins: "*"

# ========================================
# 应用配置
# ========================================
app:
  # JWT配置 (如果使用)
  jwt:
    secret: ${JWT_SECRET:your-secret-key-change-this-in-production}
    expiration: 86400000    # 24小时(毫秒)

  # 离线消息配置
  offline-message:
    max-count: 100          # 最大离线消息数
    expire-days: 7          # 离线消息过期天数

  # 会议配置
  conference:
    max-participants: 10    # 最大参与人数
    max-duration: 3600      # 最大会议时长(秒)
